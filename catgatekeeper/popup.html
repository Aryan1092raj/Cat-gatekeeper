<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>CatGatekeeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="animated-cat-tail.gif" class="logo-cat" alt="Cat">
      <div class="logo-text">
        <div class="logo-title">Cat Gatekeeper</div>
        <div class="logo-sub">Take breaks, stay focused</div>
      </div>
    </div>
    <button class="toggle" id="toggle">ON</button>
  </div>

  <div class="input-row">
    <input type="text" id="domainInput" placeholder="twitter.com" autocomplete="off" spellcheck="false">
    <input type="number" id="minutesInput" min="1" value="60" aria-label="Minutes">
    <button id="addBtn">+ Add</button>
  </div>
  <div class="hint">Set minutes per site. Timer resets when you switch tabs.</div>
  <div class="error" id="error"></div>

  <div class="list-header" id="listHeader"></div>
  <ul class="list" id="blockList"></ul>
  <div class="empty" id="empty">
    <pre>  /\_/\
 ( o.o )
  > ^ <</pre>
    <div>Add domains to block</div>
  </div>

  <div class="footer">
    <button class="quick" id="quickBtn">📌 Block this tab</button>
    <span class="ver">v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
